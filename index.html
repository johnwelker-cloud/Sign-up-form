<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="left-section">
            <div class="logo-container">
                <img src="web-background-2.jpg" alt="Logo" class="logo-icon">
                <h1 class="logo-text">ODIN</h1>
            </div>
            <p class="credit">Photo by stock images nature</p>
        </section>
        
        <section class="right-section">
            <div class="header-text">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
                <p><strong>You know you want to.</strong></p>
            </div>

            <form action="#" class="signup-form">
                <div class="form-container">
                    <h3>Let's do this!</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>
                        <div class="input-group">
                            <label for="last_name">LAST NAME</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>
                        <div class="input-group">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        <div class="input-group">
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password" name="password" required class="error">
                        </div>
                        <div class="input-group">
                            <label for="confirm_password">CONFIRM PASSWORD</label>
                            <input type="password" id="confirm_password" name="confirm_password" required class="error">
                        </div>
                    </div>
                </div>

                <div class="footer-section">
                    <button type="submit" class="submit-btn">Create Account</button>
                    <p>Already have an account? <a href="#">Log in</a></p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
